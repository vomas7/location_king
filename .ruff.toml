[tool.ruff]
# Настройки линтера
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Включить все доступные правила
select = ["ALL"]
# Игнорировать некоторые правила
ignore = [
    "ANN",  # Аннотации типов (пока)
    "D",    # Документация (пока)
    "S",    # Безопасность (проверять вручную)
    "BLE001",  # Слишком сложные конструкции
]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
# Игнорировать миграции Alembic
"**/alembic/versions/*.py" = ["ALL"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

# Настройки для конкретных правил
[tool.ruff.lint.pylint]
max-args = 6
max-locals = 15

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"