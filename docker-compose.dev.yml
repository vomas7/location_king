# Запуск: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Доступ к внутренним сервисам — только через SSH-туннель:
#   БД:       ssh -L 5432:localhost:5432 user@server  →  потом подключаться на localhost:5432
#   Keycloak: ssh -L 8080:localhost:8080 user@server  →  http://localhost:8080
#   Redis:    ssh -L 6379:localhost:6379 user@server

services:

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
    environment:
      - DEBUG=true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
