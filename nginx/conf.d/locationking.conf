# Location King - Production Configuration
# Использует SSL сертификаты от jino.ru
# HTTP только для локальной разработки

# ─────────────────────────────────────────
# 1. MAIN SITE - locationking.ru
# ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name locationking.ru www.locationking.ru;
    
    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging
    access_log /var/log/nginx/locationking_access.log;
    error_log /var/log/nginx/locationking_error.log;
}

# ─────────────────────────────────────────
# 2. AUTH - auth.locationking.ru
# ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name auth.locationking.ru;
    
    # Keycloak
    location / {
        proxy_pass http://location_king_keycloak:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging
    access_log /var/log/nginx/auth_locationking_access.log;
    error_log /var/log/nginx/auth_locationking_error.log;
}

# ─────────────────────────────────────────
# 3. API - api.locationking.ru
# ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.locationking.ru;
    
    # CORS headers - для разработки разрешаем оба протокола
    add_header Access-Control-Allow-Origin "http://locationking.ru" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;
    
    # Handle preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }
    
    # API
    location / {
        proxy_pass http://location_king_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Remove duplicate CORS headers from backend
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        
        # Add CORS headers at nginx level
        add_header Access-Control-Allow-Origin "http://locationking.ru" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }
    
    # Health check
    location /health {
        proxy_pass http://location_king_backend:8000/api/health;
        access_log off;
    }
    
    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging
    access_log /var/log/nginx/api_locationking_access.log;
    error_log /var/log/nginx/api_locationking_error.log;
}

# ─────────────────────────────────────────
# LOCALHOST DEVELOPMENT
# ─────────────────────────────────────────
server {
    listen 80;
    server_name localhost 127.0.0.1;
    
    # API для локальной разработки - должно быть ПЕРЕД location /
    location /api/ {
        proxy_pass http://location_king_backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Remove duplicate CORS headers from backend
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        
        # Add CORS headers at nginx level
        add_header Access-Control-Allow-Origin "http://localhost" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }
    
    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}