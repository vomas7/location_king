<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location King</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 20px; background: #f5f5f5; }
        .satellite-map { height: 400px; background: #ddd; border: 3px solid #333; margin-bottom: 10px; }
        .guess-map { height: 300px; background: #eee; border: 2px solid #666; margin-bottom: 20px; }
        .log { height: 200px; overflow-y: auto; background: white; padding: 10px; border: 1px solid #ccc; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
</head>
<body>
    <div class="container">
        <h1>📍 Location King</h1>
        <p class="text-muted">Найди центр космического снимка на карте!</p>
        
        <div class="row">
            <div class="col-md-8">
                <div class="satellite-map" id="satelliteMap">
                    <div style="position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);color:white;padding:5px 10px;border-radius:5px;">
                        🛰️ Космический снимок
                    </div>
                </div>
                
                <div class="guess-map" id="guessMap">
                    <div style="position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);color:white;padding:5px 10px;border-radius:5px;">
                        🗺️ Кликни чтобы выбрать центр
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="mb-3">
                    <button class="btn btn-primary w-100 mb-2" onclick="startGame()">🚀 Начать игру</button>
                    <button class="btn btn-success w-100 mb-2" onclick="submitGuess()" id="submitBtn" disabled>✅ Отправить ответ</button>
                    <button class="btn btn-warning w-100" onclick="getHint()" id="hintBtn" disabled>💡 Подсказка</button>
                </div>
                
                <div class="mb-3">
                    <label>Размер квадрата:</label>
                    <select class="form-select mb-2" id="extentSelect">
                        <option value="1">1 км</option>
                        <option value="3" selected>3 км</option>
                        <option value="5">5 км</option>
                    </select>
                </div>
                
                <div>
                    <p>Счёт: <span id="score" class="fw-bold">0</span></p>
                    <p>Раунд: <span id="round">0</span>/<span id="total">5</span></p>
                    <p>Расстояние: <span id="distance">-</span> км</p>
                </div>
            </div>
        </div>
        
        <div class="log" id="gameLog">
            <div>Готов к игре! Нажми "Начать игру"</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let sessionId = null;
        let roundId = null;
        let targetCenter = null;
        let selectedPoint = null;
        let satelliteMap = null;
        let guessMap = null;
        let guessMarker = null;
        let squareLayer = null;
        
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('gameLog');
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
            logDiv.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function initSatelliteMap() {
            satelliteMap = new ol.Map({
                target: 'satelliteMap',
                layers: [
                    new ol.layer.Tile({
                        source: new ol.source.XYZ({
                            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
                        })
                    })
                ],
                view: new ol.View({
                    center: ol.proj.fromLonLat([37.617, 55.755]),
                    zoom: 10
                }),
                controls: [],
                interactions: []
            });
            log('Космическая карта готова');
        }
        
        function initGuessMap() {
            guessMap = new ol.Map({
                target: 'guessMap',
                layers: [
                    new ol.layer.Tile({
                        source: new ol.source.OSM()
                    })
                ],
                view: new ol.View({
                    center: ol.proj.fromLonLat([37.617, 55.755]),
                    zoom: 5
                })
            });
            
            guessMap.on('click', function(e) {
                const coords = ol.proj.toLonLat(e.coordinate);
                selectedPoint = coords;
                
                if (guessMarker) guessMap.removeLayer(guessMarker);
                guessMarker = new ol.layer.Vector({
                    source: new ol.source.Vector({
                        features: [new ol.Feature({ geometry: new ol.geom.Point(e.coordinate) })]
                    }),
                    style: new ol.style.Style({
                        image: new ol.style.Circle({
                            radius: 8, fill: new ol.style.Fill({color: 'red'}),
                            stroke: new ol.style.Stroke({color: 'white', width: 3})
                        })
                    })
                });
                guessMap.addLayer(guessMarker);
                document.getElementById('submitBtn').disabled = false;
                log(`Выбрана точка: ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}`);
            });
            log('Карта для выбора готова');
        }
        
        function drawSquare(center, extentKm) {
            if (squareLayer) satelliteMap.removeLayer(squareLayer);
            
            const degPerKm = 0.009;
            const half = (extentKm / 2) * degPerKm;
            const coords = [
                [center[0] - half, center[1] - half],
                [center[0] + half, center[1] - half],
                [center[0] + half, center[1] + half],
                [center[0] - half, center[1] + half],
                [center[0] - half, center[1] - half]
            ];
            
            const olCoords = coords.map(c => ol.proj.fromLonLat(c));
            squareLayer = new ol.layer.Vector({
                source: new ol.source.Vector({
                    features: [new ol.Feature({ geometry: new ol.geom.Polygon([olCoords]) })]
                }),
                style: new ol.style.Style({
                    stroke: new ol.style.Stroke({ color: 'red', width: 3 }),
                    fill: new ol.style.Fill({ color: 'rgba(255,0,0,0.1)' })
                })
            });
            satelliteMap.addLayer(squareLayer);
        }
        
        async function startGame() {
            const extentKm = parseInt(document.getElementById('extentSelect').value);
            
            try {
                log('Начинаем игру...');
                const res = await fetch(API_URL + '/sessions/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ rounds_total: 5, view_extent_km: extentKm })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    sessionId = data.id;
                    roundId = data.current_round?.id;
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('hintBtn').disabled = false;
                    document.getElementById('score').textContent = data.total_score;
                    document.getElementById('round').textContent = data.rounds_done;
                    log(`Игра начата! Сессия: ${sessionId.substring(0,8)}...`);
                    
                    if (roundId) await loadRound(roundId);
                } else {
                    const err = await res.json();
                    log(`Ошибка: ${err.detail}`, 'error');
                }
            } catch (e) {
                log(`Ошибка: ${e.message}`, 'error');
            }
        }
        
        async function loadRound(roundId) {
            try {
                const res = await fetch(API_URL + '/rounds/' + roundId);
                if (res.ok) {
                    const round = await res.json();
                    if (round.target_point) {
                        targetCenter = [
                            round.target_point.coordinates[0],
                            round.target_point.coordinates[1]
                        ];
                        satelliteMap.getView().setCenter(ol.proj.fromLonLat(targetCenter));
                        satelliteMap.getView().setZoom(12);
                        const extentKm = parseInt(document.getElementById('extentSelect').value);
                        drawSquare(targetCenter, extentKm);
                        log(`Раунд ${round.round_number} загружен`);
                    }
                    document.getElementById('round').textContent = round.round_number;
                    selectedPoint = null;
                    if (guessMarker) {
                        guessMap.removeLayer(guessMarker);
                        guessMarker = null;
                    }
                    document.getElementById('submitBtn').disabled = true;
                }
            } catch (e) {
                log(`Ошибка: ${e.message}`, 'error');
            }
        }
        
        async function submitGuess() {
            if (!selectedPoint || !roundId) {
                log('Сначала выбери точку!', 'error');
                return;
            }
            
            try {
                log('Отправляем ответ...');
                const res = await fetch(API_URL + '/rounds/' + roundId + '/guess', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        longitude: selectedPoint[0], 
                        latitude: selectedPoint[1] 
                    })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('score').textContent = data.total_session_score;
                    document.getElementById('round').textContent = data.rounds_done;
                    document.getElementById('distance').textContent = data.distance_km.toFixed(2);
                    log(`Расстояние: ${data.distance_km.toFixed(2)} км, Очки: ${data.score}`);
                    
                    if (data.next_round) {
                        roundId = data.next_round.id;
                        setTimeout(() => loadRound(roundId), 1000);
                    } else if (data.is_session_finished) {
                        log('Игра завершена!', 'success');
                        document.getElementById('submitBtn').disabled = true;
                        document.getElementById('hintBtn').disabled = true;
                    }
                } else {
                    const err = await res.json();
                    log(`Ошибка: ${err.detail}`, 'error');
                }
            } catch (e) {
                log(`Ошибка: ${e.message}`, 'error');
            }
        }
        
        async function getHint() {
            if (!roundId) {
                log('Нет активного раунда!', 'error');
                return;
            }
            
            try {
                const res = await fetch(API_URL + '/rounds/' + roundId + '/hint');
                if (res.ok) {
                    const hint = await res.json();
                    log(`Подсказка: ${hint.hint}`);
                }
            } catch (e) {
                log(`Ошибка: ${e.message}`, 'error');
            }
        }
        
        window.onload = function() {
            initSatelliteMap();
            initGuessMap();
            log('Готов к игре!');
        };
    </script>
</body>
</html>
