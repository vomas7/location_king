<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location King 🦁</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --accent: #f72585;
            --dark: #121212;
            --darker: #0a0a0a;
            --light: #f8f9fa;
            --gray: #2d2d2d;
            --success: #4cc9f0;
            --warning: #f8961e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--darker);
            color: var(--light);
            overflow: hidden;
            height: 100vh;
        }
        
        /* Основной контейнер */
        .game-container {
            display: flex;
            height: 100vh;
            position: relative;
        }
        
        /* Левая панель - карта */
        .map-container {
            flex: 1;
            position: relative;
            background: var(--dark);
        }
        
        #satelliteMap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #guessMap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 200px;
            border-radius: 12px;
            border: 3px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 2;
            overflow: hidden;
        }
        
        /* Правая панель - управление */
        .control-panel {
            width: 380px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--gray);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
        }
        
        /* Заголовок */
        .game-header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .game-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .game-header .subtitle {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        /* Карточки */
        .card {
            background: var(--gray);
            border: none;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .card-title {
            color: var(--light);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title i {
            color: var(--primary);
        }
        
        /* Кнопки */
        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #f3722c);
            color: white;
        }
        
        .btn-secondary {
            background: var(--gray);
            color: var(--light);
        }
        
        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
        }
        
        /* Селекторы */
        .form-select {
            background: var(--dark);
            border: 2px solid var(--gray);
            color: var(--light);
            border-radius: 10px;
            padding: 12px;
        }
        
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        
        /* Лог */
        .log-container {
            flex: 1;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            background: var(--dark);
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
        }
        
        .log-entry {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            font-size: 0.9rem;
        }
        
        .log-entry.success {
            border-left-color: var(--success);
        }
        
        .log-entry.error {
            border-left-color: var(--accent);
        }
        
        /* Оверлей загрузки */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--gray);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Адаптивность */
        @media (max-width: 992px) {
            .game-container {
                flex-direction: column;
            }
            
            .control-panel {
                width: 100%;
                height: 40vh;
                border-left: none;
                border-top: 1px solid var(--gray);
            }
            
            #guessMap {
                width: 200px;
                height: 150px;
            }
        }
        
        /* Анимации */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(67, 97, 238, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(67, 97, 238, 0); }
            100% { box-shadow: 0 0 0 0 rgba(67, 97, 238, 0); }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Левая часть - карты -->
        <div class="map-container">
            <div id="satelliteMap"></div>
            <div id="guessMap"></div>
            
            <!-- Оверлей загрузки -->
            <div id="loadingOverlay" class="loading-overlay" style="display: none;">
                <div class="spinner"></div>
                <div style="margin-left: 20px; font-size: 1.2rem;">Загрузка игры...</div>
            </div>
        </div>
        
        <!-- Правая часть - управление -->
        <div class="control-panel">
            <!-- Заголовок -->
            <div class="game-header">
                <h1>LOCATION KING 🦁</h1>
                <div class="subtitle">Найди центр космического снимка на карте</div>
            </div>
            
            <!-- Управление игрой -->
            <div class="card">
                <div class="card-title"><i class="fas fa-gamepad"></i> Управление игрой</div>
                <button class="btn btn-primary w-100 mb-3 pulse" onclick="startGame()" id="startBtn">
                    <i class="fas fa-rocket"></i> НАЧАТЬ ИГРУ
                </button>
                <button class="btn btn-success w-100 mb-3" onclick="submitGuess()" id="submitBtn" disabled>
                    <i class="fas fa-check-circle"></i> ОТПРАВИТЬ ОТВЕТ
                </button>
                <button class="btn btn-warning w-100" onclick="getHint()" id="hintBtn" disabled>
                    <i class="fas fa-lightbulb"></i> ПОЛУЧИТЬ ПОДСКАЗКУ
                </button>
            </div>
            
            <!-- Настройки -->
            <div class="card">
                <div class="card-title"><i class="fas fa-cog"></i> Настройки</div>
                <div class="mb-3">
                    <label class="form-label">Сложность:</label>
                    <select class="form-select" id="difficultySelect">
                        <option value="1">🟢 Легкая</option>
                        <option value="3" selected>🟡 Средняя</option>
                        <option value="5">🔴 Сложная</option>
                        <option value="7">⚫ Эксперт</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Размер квадрата:</label>
                    <select class="form-select" id="extentSelect">
                        <option value="1">1 км</option>
                        <option value="3" selected>3 км</option>
                        <option value="5">5 км</option>
                        <option value="10">10 км</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Количество раундов:</label>
                    <select class="form-select" id="roundsSelect">
                        <option value="1">1 раунд</option>
                        <option value="3" selected>3 раунда</option>
                        <option value="5">5 раундов</option>
                        <option value="10">10 раундов</option>
                    </select>
                </div>
            </div>
            
            <!-- Статистика -->
            <div class="card">
                <div class="card-title"><i class="fas fa-chart-line"></i> Статистика</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="scoreValue">0</div>
                        <div class="stat-label">Очки</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="roundValue">0/0</div>
                        <div class="stat-label">Раунды</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="distanceValue">-</div>
                        <div class="stat-label">Расстояние</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="accuracyValue">-</div>
                        <div class="stat-label">Точность</div>
                    </div>
                </div>
            </div>
            
            <!-- Лог игры -->
            <div class="card">
                <div class="card-title"><i class="fas fa-scroll"></i> Ход игры</div>
                <div class="log-container" id="gameLog">
                    <div class="log-entry fade-in">
                        <i class="fas fa-info-circle text-primary"></i> Добро пожаловать в Location King!
                    </div>
                    <div class="log-entry fade-in">
                        <i class="fas fa-info-circle text-primary"></i> Нажмите "НАЧАТЬ ИГРУ" чтобы начать
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Глобальные переменные
        let satelliteMap, guessMap;
        let currentSession = null;
        let currentRound = null;
        let selectedPoint = null;
        let marker = null;
        
        // Базовый URL API
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost/api' 
            : 'https://api.locationking.ru/api';
        
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            initMaps();
            updateStats();
        });
        
        // Инициализация карт
        function initMaps() {
            // Карта со спутниковым снимком (верхняя, большая)
            satelliteMap = new ol.Map({
                target: 'satelliteMap',
                layers: [
                    new ol.layer.Tile({
                        source: new ol.source.XYZ({
                            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                            attributions: '© Esri, Maxar, Earthstar Geographics, USDA FSA, USGS, Aerogrid, IGN, IGP, and the GIS User Community'
                        })
                    })
                ],
                view: new ol.View({
                    center: ol.proj.fromLonLat([37.6173, 55.7558]), // Москва
                    zoom: 10,
                    minZoom: 1,
                    maxZoom: 19
                }),
                controls: ol.control.defaults({
                    zoom: false,
                    rotate: false
                })
            });
            
            // Карта для выбора точки (нижняя, маленькая)
            guessMap = new ol.Map({
                target: 'guessMap',
                layers: [
                    new ol.layer.Tile({
                        source: new ol.source.OSM()
                    })
                ],
                view: new ol.View({
                    center: ol.proj.fromLonLat([37.6173, 55.7558]), // Москва
                    zoom: 3,
                    minZoom: 1,
                    maxZoom: 19
                })
            });
            
            // Обработчик клика на карте для выбора
            guessMap.on('click', function(event) {
                if (!currentSession) {
                    addLog('Сначала начните игру!', 'error');
                    return;
                }
                
                const coords = ol.proj.toLonLat(event.coordinate);
                selectedPoint = {
                    type: 'Point',
                    coordinates: coords
                };
                
                // Удаляем старый маркер
                if (marker) {
                    guessMap.removeLayer(marker);
                }
                
                // Добавляем новый маркер
                marker = new ol.layer.Vector({
                    source: new ol.source.Vector({
                        features: [
                            new ol.Feature({
                                geometry: new ol
