<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location King</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 20px; background: #f5f5f5; }
        .map { height: 400px; background: #ddd; border: 1px solid #ccc; margin-bottom: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
</head>
<body>
    <div class="container">
        <h1>Location King</h1>
        <div class="map" id="map"></div>
        
        <div class="mb-3">
            <button class="btn btn-primary" onclick="startGame()">Начать игру</button>
            <button class="btn btn-success" onclick="submitGuess()" id="submit-btn" disabled>Отправить догадку</button>
        </div>
        
        <div class="row">
            <div class="col-md-6">
                <input type="number" class="form-control mb-2" id="lng" placeholder="Долгота" step="0.0001">
                <input type="number" class="form-control mb-2" id="lat" placeholder="Широта" step="0.0001">
            </div>
            <div class="col-md-6">
                <p>Счёт: <span id="score">0</span></p>
                <p>Раунд: <span id="round">0</span>/<span id="total">5</span></p>
            </div>
        </div>
        
        <div id="log" style="height: 200px; overflow-y: auto; background: white; padding: 10px; border: 1px solid #ccc; margin-top: 20px;"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let sessionId = null;
        let roundId = null;
        let map = null;
        let marker = null;
        
        function log(msg) {
            const div = document.getElementById('log');
            div.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }
        
        function initMap() {
            map = new ol.Map({
                target: 'map',
                layers: [
                    new ol.layer.Tile({ source: new ol.source.OSM() }),
                    new ol.layer.Tile({
                        source: new ol.source.XYZ({
                            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
                        })
                    })
                ],
                view: new ol.View({
                    center: ol.proj.fromLonLat([37.617, 55.755]),
                    zoom: 5
                })
            });
            
            map.on('click', function(e) {
                const coords = ol.proj.toLonLat(e.coordinate);
                document.getElementById('lng').value = coords[0].toFixed(4);
                document.getElementById('lat').value = coords[1].toFixed(4);
                
                if (marker) map.removeLayer(marker);
                marker = new ol.layer.Vector({
                    source: new ol.source.Vector({
                        features: [new ol.Feature({ geometry: new ol.geom.Point(e.coordinate) })]
                    }),
                    style: new ol.style.Style({
                        image: new ol.style.Circle({
                            radius: 7, fill: new ol.style.Fill({color: 'red'}),
                            stroke: new ol.style.Stroke({color: 'white', width: 2})
                        })
                    })
                });
                map.addLayer(marker);
                log(`Точка: ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}`);
            });
            
            log('Карта готова');
        }
        
        async function startGame() {
            try {
                log('Начинаем игру...');
                const res = await fetch(API_URL + '/sessions/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ rounds_total: 5 })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    sessionId = data.id;
                    roundId = data.current_round?.id;
                    document.getElementById('submit-btn').disabled = false;
                    log(`Сессия ${sessionId} начата`);
                } else {
                    const err = await res.json();
                    log(`Ошибка: ${err.detail}`);
                }
            } catch (e) {
                log(`Ошибка: ${e.message}`);
            }
        }
        
        async function submitGuess() {
            const lng = document.getElementById('lng').value;
            const lat = document.getElementById('lat').value;
            
            if (!lng || !lat || !roundId) {
                log('Введите координаты!');
                return;
            }
            
            try {
                log('Отправляем догадку...');
                const res = await fetch(API_URL + '/rounds/' + roundId + '/guess', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ longitude: parseFloat(lng), latitude: parseFloat(lat) })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('score').textContent = data.total_session_score;
                    document.getElementById('round').textContent = data.rounds_done;
                    log(`Расстояние: ${data.distance_km.toFixed(2)} км, Очки: ${data.score}`);
                    
                    if (data.next_round) {
                        roundId = data.next_round.id;
                    } else if (data.is_session_finished) {
                        log('Игра завершена!');
                        document.getElementById('submit-btn').disabled = true;
                    }
                } else {
                    const err = await res.json();
                    log(`Ошибка: ${err.detail}`);
                }
            } catch (e) {
                log(`Ошибка: ${e.message}`);
            }
        }
        
        window.onload = function() {
            initMap();
            log('Готов к игре!');
        };
    </script>
</body>
</html>
