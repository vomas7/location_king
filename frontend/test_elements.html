<!DOCTYPE html>
<html>
<head>
    <title>Проверка элементов DOM</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>Проверка элементов DOM игры</h1>
    
    <div id="results"></div>
    
    <script>
        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test ${type}`;
            div.textContent = message;
            results.appendChild(div);
            console.log(message);
        }
        
        // Проверяем элементы
        const requiredElements = [
            'startBtn',
            'submitBtn', 
            'centerBtn',
            'toggleMinimapBtn',
            'gameLog',
            'loadingOverlay',
            'roundsSelect',
            'difficultySelect',
            'scoreValue',
            'roundValue',
            'distanceValue',
            'accuracyValue'
        ];
        
        let missingElements = [];
        
        requiredElements.forEach(id => {
            const element = document.getElementById(id);
            if (element) {
                addResult(`✅ ${id} найден`, 'success');
            } else {
                addResult(`❌ ${id} не найден`, 'error');
                missingElements.push(id);
            }
        });
        
        // Итог
        if (missingElements.length === 0) {
            addResult('✅ Все элементы DOM присутствуют!', 'success');
        } else {
            addResult(`❌ Отсутствуют элементы: ${missingElements.join(', ')}`, 'error');
            addResult('⚠️ Возможно, игра не загрузила index.html полностью', 'warning');
        }
        
        // Проверяем загрузку index.js
        setTimeout(() => {
            addResult('--- Проверка функций ---', 'info');
            
            const requiredFunctions = [
                'startGame',
                'submitGuess',
                'centerSatelliteMap',
                'toggleOSMMap'
            ];
            
            let missingFunctions = [];
            
            requiredFunctions.forEach(func => {
                if (typeof window[func] === 'function') {
                    addResult(`✅ ${func}() определена`, 'success');
                } else {
                    addResult(`❌ ${func}() не определена`, 'error');
                    missingFunctions.push(func);
                }
            });
            
            if (missingFunctions.length === 0) {
                addResult('✅ Все функции определены!', 'success');
            } else {
                addResult(`❌ Отсутствуют функции: ${missingFunctions.join(', ')}`, 'error');
                addResult('⚠️ Проверьте загрузку index.js', 'warning');
            }
        }, 500);
    </script>
</body>
</html>
