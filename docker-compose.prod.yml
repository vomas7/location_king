version: '3.8'

# Production configuration for Location King
# Используется с .env.production

services:
  # ─────────────────────────────────────────
  # NGINX — основной прокси и фронтенд
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: location_king_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL сертификаты
    depends_on:
      - backend
      - keycloak
    networks:
      - internal_net
      - public_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # BACKEND — FastAPI приложение
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: location_king_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # POSTGRESQL + POSTGIS — основная БД
  # ─────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: location_king_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init_prod.sql:/docker-entrypoint-initdb.d/init_prod.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # REDIS — игровые сессии и кэш
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: location_king_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # KEYCLOAK — авторизация (production)
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: location_king_keycloak
    restart: unless-stopped
    command: start --optimized --hostname-strict=false
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME}
      - KC_HOSTNAME_STRICT_HTTPS=true
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=false
      - KC_HTTPS_CERTIFICATE_FILE=/etc/keycloak/certs/tls.crt
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/etc/keycloak/certs/tls.key
      - KC_HTTPS_PORT=8443
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak_db:5432/${KEYCLOAK_DB}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    volumes:
      - ./keycloak_data:/opt/keycloak/data
      - ./ssl:/etc/keycloak/certs:ro
    depends_on:
      keycloak_db:
        condition: service_healthy
    networks:
      - internal_net
      - public_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # KEYCLOAK DATABASE — отдельная БД для Keycloak
  # ─────────────────────────────────────────
  keycloak_db:
    image: postgres:16-alpine
    container_name: location_king_keycloak_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${KEYCLOAK_DB}
      - POSTGRES_USER=${KEYCLOAK_DB_USER}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal_net:
    internal: true
  public_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  keycloak_db_data: