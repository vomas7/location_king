name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
    
    - name: Run ruff lint
      run: ruff check --config=backend/pyproject.toml app/
    
    - name: Run ruff format check
      run: ruff format --check --config=backend/pyproject.toml app/
  
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: locationking
          POSTGRES_PASSWORD: locationking123
          POSTGRES_DB: location_king_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install PostgreSQL client
      run: sudo apt-get update && sudo apt-get install -y postgresql-client
    
    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -p 5432; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
    
    - name: Run simple tests
      env:
        DATABASE_URL: postgresql+asyncpg://locationking:locationking123@localhost:5432/location_king_test
        REDIS_URL: redis://localhost:6379
        KEYCLOAK_URL: https://keycloak.example.com
        KEYCLOAK_REALM: location-king
        KEYCLOAK_CLIENT_ID: location-king-backend
        DEBUG: true
      run: |
        # Просто проверяем что Python импортируется
        python -c "print('✅ Python works')"
        
        # Проверяем что можем импортировать основные модули
        python -c "
        try:
            from app.main import app
            from app.database import engine
            print('✅ Main modules import successfully')
        except Exception as e:
            print(f'❌ Import error: {e}')
            raise
        "
        
        # Проверяем что можем импортировать game_mock.py
        python -c "
        try:
            from app.game_mock import router
            print('✅ Game mock module imports successfully')
        except Exception as e:
            print(f'❌ Game mock import error: {e}')
            raise
        "
  
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/location-king-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/location-king-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max