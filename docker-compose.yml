services:

  # ─────────────────────────────────────────
  # NGINX — точка входа
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: geogame_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
      - keycloak
    networks:
      - public_net
      - internal_net

  # ─────────────────────────────────────────
  # FRONTEND — OpenLayers (собранная статика)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geogame_frontend
    restart: unless-stopped
    networks:
      - internal_net

  # ─────────────────────────────────────────
  # BACKEND — FastAPI
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geogame_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_net
    volumes:
      - ./backend/app:/app/app  # hot reload в dev режиме

  # ─────────────────────────────────────────
  # PostgreSQL + PostGIS — игровая БД
  # ─────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: geogame_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  # ─────────────────────────────────────────
  # REDIS — игровые сессии и кэш
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: geogame_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  # ─────────────────────────────────────────
  # KEYCLOAK — авторизация
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: geogame_keycloak
    restart: unless-stopped
    command: start-dev --import-realm  # в prod заменить на start
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak_db:5432/${KEYCLOAK_DB}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_PROXY=edge  # nginx стоит перед ним
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak_db:
        condition: service_healthy
    networks:
      - internal_net

  # ─────────────────────────────────────────
  # PostgreSQL — отдельно для Keycloak
  # ─────────────────────────────────────────
  keycloak_db:
    image: postgres:16-alpine
    container_name: geogame_keycloak_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${KEYCLOAK_DB_USER}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - POSTGRES_DB=${KEYCLOAK_DB}
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  pgdata:
  redisdata:
  keycloak_pgdata:
  nginx_logs:

# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────
networks:
  public_net:       # nginx смотрит наружу
    driver: bridge
  internal_net:     # все сервисы общаются только внутри
    driver: bridge
    internal: true
